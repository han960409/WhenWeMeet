version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: whenwemeet-db

    environment:
      POSTGRES_DB: whenwemeet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: